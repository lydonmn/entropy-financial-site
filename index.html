<span id="three-year-yield">Loading...</span></p><p><strong>5-Year Yield:</strong> <span id="five-year-yield">Loading...</span></p><p><strong>10-Year Yield:</strong> <span id="ten-year-yield">Loading...</span></p></div><div class="news-widget"><h3>Latest Financial News</h3><ul class="news-list" id="marketwatch-news"></ul></div></div></section><script>document.addEventListener("DOMContentLoaded", () => { async function fetchTreasuryYields() { const threeYearElement = document.getElementById("three-year-yield"); const fiveYearElement = document.getElementById("five-year-yield"); const tenYearElement = document.getElementById("ten-year-yield"); const timestampElement = document.getElementById("yield-timestamp"); const cachedData = localStorage.getItem("treasuryYields"); const cachedTimestamp = localStorage.getItem("treasuryYieldsTimestamp"); const cacheAge = cachedTimestamp ? (Date.now() - parseInt(cachedTimestamp)) / 1000 / 60 : Infinity; if (cachedData && cacheAge < 30) { const { threeYearYield, fiveYearYield, tenYearYield, timestamp } = JSON.parse(cachedData); threeYearElement.textContent = `${threeYearYield}%`; fiveYearElement.textContent = `${fiveYearYield}%`; tenYearElement.textContent = `${tenYearYield}%`; timestampElement.textContent = `(Live as of ${timestamp})`; return; } const apiKey = "YOUR_NEW_FRED_API_KEY"; const threeYearUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=DGS3&api_key=${apiKey}&file_type=json&limit=1&sort_order=desc`; const fiveYearUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=DGS5&api_key=${apiKey}&file_type=json&limit=1&sort_order=desc`; const tenYearUrl = `https://api.stlouisfed.org/fred/series/observations?series_id=DGS10&api_key=${apiKey}&file_type=json&limit=1&sort_order=desc`; try { const threeYearResponse = await fetch(threeYearUrl); if (!threeYearResponse.ok) throw new Error(`HTTP error! status: ${threeYearResponse.status}`); const threeYearData = await threeYearResponse.json(); const threeYearYield = threeYearData.observations[0].value; const fiveYearResponse = await fetch(fiveYearUrl); if (!fiveYearResponse.ok) throw new Error(`HTTP error! status: ${fiveYearResponse.status}`); const fiveYearData = await fiveYearResponse.json(); const fiveYearYield = fiveYearData.observations[0].value; const tenYearResponse = await fetch(tenYearUrl); if (!tenYearResponse.ok) throw new Error(`HTTP error! status: ${tenYearResponse.status}`); const tenYearData = await tenYearResponse.json(); const tenYearYield = tenYearData.observations[0].value; const timestamp = new Date(threeYearData.observations[0].date).toLocaleDateString(); threeYearElement.textContent = `${threeYearYield}%`; fiveYearElement.textContent = `${fiveYearYield}%`; tenYearElement.textContent = `${tenYearYield}%`; timestampElement.textContent = `(Live as of ${timestamp})`; const cacheData = { threeYearYield, fiveYearYield, tenYearYield, timestamp }; localStorage.setItem("treasuryYields", JSON.stringify(cacheData)); localStorage.setItem("treasuryYieldsTimestamp", Date.now().toString()); } catch (error) { console.error("Error fetching Treasury yields:", error.message); threeYearElement.textContent = "4.30%"; fiveYearElement.textContent = "4.35%"; tenYearElement.textContent = "4.38%"; timestampElement.textContent = "(Failed to fetch live data, showing static values)"; } } fetchTreasuryYields(); async function fetchMarketWatchNews() { const newsList = document.getElementById("marketwatch-news"); const proxyUrl = "https://cors-anywhere.herokuapp.com/"; const rssUrl = "https://www.marketwatch.com/rss/topstories"; const url = proxyUrl + rssUrl; try { const response = await fetch(url); if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`); const text = await response.text(); const parser = new DOMParser(); const xmlDoc = parser.parseFromString(text, "text/xml"); const items = xmlDoc.getElementsByTagName("item"); newsList.innerHTML = ""; for (let i = 0; i < Math.min(items.length, 5); i++) { const title = items[i].getElementsByTagName("title")[0].textContent; const link = items[i].getElementsByTagName("link")[0].textContent; const li = document.createElement("li"); li.innerHTML = `<a href="${link}" target="_blank">${title}</a><span class="read-more"><a href="${link}" target="_blank">Read full story</a></span>`; newsList.appendChild(li); } } catch (error) { console.error("Error fetching MarketWatch news:", error.message); newsList.innerHTML = "<li>Unable to load news at this time.</li>"; } } fetchMarketWatchNews(); });</script></body></html>
